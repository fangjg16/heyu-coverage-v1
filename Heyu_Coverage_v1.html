<style>
  /*
   * Open Design — 「editorial-monocle」方向令牌（OKLch + 字体栈）

   * 气质：Monocle / FT 式编辑部 — 衬线标题、系统 sans 正文、克制朱砂点缀、边框优于投影。
   * 展示字体用开源 Literata 近似 Iowan Old Style / Charter；中文回退苹方/雅黑。

  :root {

    /* 合域范围：暖棕色系对角渐变（奶油 → 焦糖 → 可可） */
    --heyu-grad-a: #f4e4d4;

  /* 单行控制条 + 产品选择浮层（不占首屏大块面积） */
  .chrome-bar {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 8px 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 12px;
    margin-bottom: 10px;

  .chrome-bar .dock-toggle {
    font-family: var(--font-body);
    font-size: 12px;

    padding: 7px 14px;

  .chrome-bar .stat {

  /* 外壳（边框）+ 内壳（滚动）：对齐 Excel 工作表面板式预览 */

function escHtml(s){
  return String(s ?? '')
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

function nlToBr(s){
  return escHtml(s).replace(/\n/g,'<br>');
}

function syncStickyOffsets(){
  const table = document.getElementById('matrix');
  if(!table) return;
  const thead = table.querySelector('thead');
  const b1 = table.querySelector('.thead-banner-title');
  const b2 = table.querySelector('.thead-banner-sub');
  const r3 = table.querySelector('.thead-stage-row');
  const hBanner = (b1 && b1.offsetHeight || 0) + (b2 && b2.offsetHeight || 0);
  const hR3 = r3 && r3.offsetHeight || 0;
  table.style.setProperty('--thead-stage-row3-top', hBanner + 'px');
  table.style.setProperty('--thead-stage-row4-top', (hBanner + hR3) + 'px');
  table.style.setProperty('--frozen-head-height', (thead && thead.offsetHeight || 0) + 'px');
  scheduleHeyuScopeRefresh();
  schedulePhOverlayRefresh();
}

(function renderFromCoverage(){
  const blocks = (typeof COVERAGE_DATA !== 'undefined' && COVERAGE_DATA.blocks) ? COVERAGE_DATA.blocks : [];
  const titleEl = document.getElementById('thead-sheet-title');
  const subEl = document.getElementById('thead-sheet-subtitle');
  if(titleEl && COVERAGE_DATA.title) titleEl.textContent = COVERAGE_DATA.title;
  if(subEl && COVERAGE_DATA.subtitle) subEl.textContent = COVERAGE_DATA.subtitle;

  blocks.forEach(block=>{
    const pillarCls = block.pillarCls || '';
    const pillarRowSpan = block.segments.reduce((n, seg)=> n + seg.rows.length, 0);
    let pillarInserted = false;

    block.segments.forEach(seg=>{
      const subRowSpan = seg.rows.length;
      const catLabel = (seg.subLabel || '').split('\n')[0].trim();
      let subInserted = false;

      seg.rows.forEach(rowData=>{
        const tr = document.createElement('tr');
        tr.className = pillarCls;

        let html = '';
        if(!pillarInserted){
          html += `<td class="pillar-cell" rowspan="${pillarRowSpan}" style="white-space:pre-line">${nlToBr(block.pillarText || '')}</td>`;
          pillarInserted = true;
        }
        if(!subInserted){
          const subCls = seg.subCls ? String(seg.subCls) : '';
          html += `<td class="sub-pillar-cell ${subCls}" rowspan="${subRowSpan}" style="white-space:pre-line">${nlToBr(seg.subLabel || '')}</td>`;
          subInserted = true;
        }

        const rowId = rowIdxCounter++;
        const cells = rowData.cells || [];
        dataRows.push({
          id: rowId,
          label: rowData.label,
          en: rowData.en || '',
          cat: catLabel || ''
        });

        html += `<td class="row-label-col">
          ${escHtml(rowData.label)}${rowData.en ? `<span class="row-en">${escHtml(rowData.en)}</span>` : ''}
        </td>`;

        for(let i = 0; i < N_COLS; i++){
          const c = cells[i];
          if(c === null || c === undefined){
            html += `<td class="cell empty-cell" data-row="${rowId}" data-col="${i}"></td>`;
          } else {
            html += `<td class="cell" data-row="${rowId}" data-col="${i}">${escHtml(c)}</td>`;
          }
        }
        tr.innerHTML = html;
        tbody.appendChild(tr);
      });
    });
  });
})();

function hashHueFromId(id){
  let h = 0;
  for(let i = 0; i < id.length; i++) h = ((h << 5) - h) + id.charCodeAt(i);
  return Math.abs(h) % 360;
}

function fixedExampleColor(pid){
  if(FIXED_EXAMPLE_COLORS[pid]) return FIXED_EXAMPLE_COLORS[pid];
  const hue = hashHueFromId(pid);
  return `hsl(${hue}, 52%, 46%)`;
}

function selectedIdsInCatalogOrder(){
  const out = [];
  FO_PRODUCT_RAIL.forEach(line=>{
    line.examples.forEach(ex=>{
      if(activeProductIds.has(ex.id)) out.push(ex.id);
    });
  });
  return out;
}

function categoryForExampleId(id){
  for(let i = 0; i < FO_PRODUCT_RAIL.length; i++){
    if(FO_PRODUCT_RAIL[i].examples.some(e=>e.id === id)) return FO_PRODUCT_RAIL[i].category;
  }
  return '';
}

function exampleLabelById(id){
  for(let li = 0; li < FO_PRODUCT_RAIL.length; li++){
    const ex = FO_PRODUCT_RAIL[li].examples.find(e=>e.id === id);
    if(ex) return ex.label;
  }
  return id;
}

function colsHuman(cols){
  if(cols === 'all') return '①—⑥ 全阶段';
  const arr = (cols || []).map(c=>PH_STAGE_ABBR[c] || String(c));
  return arr.join('、');
}

function coveragePartsFromSpec(spec){
  if(!spec) return [];
  if(Array.isArray(spec.covers) && spec.covers.length) return spec.covers;
  if(spec.rowLabel) return [{ rowLabel: spec.rowLabel, cols: spec.cols }];
  return [];
}

function coverageHintForProduct(pid){
  const spec = PRODUCT_COVERAGE[pid];
  if(!spec) return '';
  if(typeof spec.hint === 'string' && spec.hint.trim()) return spec.hint.trim();
  const parts = coveragePartsFromSpec(spec);
  if(!parts.length) return '';
  if(parts.length === 1) return `${parts[0].rowLabel}（${colsHuman(parts[0].cols)}）`;
  const allFull = parts.every(p=>p.cols === 'all');
  if(allFull) return `${parts.length} 条业务（${colsHuman('all')}）`;
  return `${parts.length} 条业务组合（阶段各异）`;
}

function cellCoverageTitle(ids){
  return ids.map(pid=>{
    const cat = categoryForExampleId(pid);
    const lab = exampleLabelById(pid);
    const cov = coverageHintForProduct(pid);
    return `${cat} · ${lab} → ${cov}`;
  }).join('\n');
}

function rowIdByLabel(label){
  const r = dataRows.find(x => x.label === label);

function heyuScopeCells(){

function refreshHeyuScopeOverlay(){
  const wrap = document.getElementById('matrix-ph-wrap');
  const svg = document.getElementById('heyu-scope-svg');
  if(!wrap || !svg) return;
  while(svg.firstChild) svg.removeChild(svg.firstChild);
  if(!heyuScopeLayerOn) return;

  const cells = heyuScopeCells();
  if(!cells.length) return;

  const w = Math.max(1, wrap.clientWidth);
  const h = Math.max(1, wrap.clientHeight);
  svg.setAttribute('viewBox', `0 0 ${w} ${h}`);
  svg.setAttribute('width', String(w));
  svg.setAttribute('height', String(h));

  const NS = 'http://www.w3.org/2000/svg';
  const defs = document.createElementNS(NS, 'defs');
  const fillGrad = document.createElementNS(NS, 'linearGradient');
  fillGrad.setAttribute('id', 'heyu-fill-grad');
  fillGrad.setAttribute('gradientUnits', 'objectBoundingBox');
  fillGrad.setAttribute('x1', '0');
  fillGrad.setAttribute('y1', '0');
  fillGrad.setAttribute('x2', '1');
  fillGrad.setAttribute('y2', '1');
  [['0%', '#fdf5eb'], ['18%', '#edd9bf'], ['42%', '#d9b088'], ['68%', '#a67447'], ['100%', '#6b3f26']].forEach(([off, col])=>{
    const s = document.createElementNS(NS, 'stop');
    s.setAttribute('offset', off);
    s.setAttribute('stop-color', col);
    fillGrad.appendChild(s);
  });
  const fillRot = document.createElementNS(NS, 'animateTransform');
  fillRot.setAttribute('attributeName', 'gradientTransform');
  fillRot.setAttribute('type', 'rotate');
  fillRot.setAttribute('from', '0 0.5 0.5');
  fillRot.setAttribute('to', '360 0.5 0.5');
  fillRot.setAttribute('dur', '28s');
  fillRot.setAttribute('repeatCount', 'indefinite');
  fillGrad.appendChild(fillRot);
  defs.appendChild(fillGrad);
  svg.appendChild(defs);

  let runs = rowRunsFromCells(cells);
  runs = mergeRunsVertical(runs);
  const inset = 0.75;

  runs.forEach(run=>{
    const box = rectForRowColSpan(wrap, run.row, run.rowEnd, run.c0, run.c1);
    if(!box || box.width < 2 || box.height < 2) return;
    const x = box.left + inset;
    const y = box.top + inset;
    const rw = box.width - 2 * inset;
    const rh = box.height - 2 * inset;
    if(rw < 4 || rh < 4) return;

    const fillR = document.createElementNS(NS, 'rect');
    fillR.setAttribute('x', String(x));
    fillR.setAttribute('y', String(y));
    fillR.setAttribute('width', String(rw));
    fillR.setAttribute('height', String(rh));
    fillR.setAttribute('rx', '5');
    fillR.setAttribute('fill', 'url(#heyu-fill-grad)');
    fillR.setAttribute('fill-opacity', '0.7');
    svg.appendChild(fillR);

    const frame = document.createElementNS(NS, 'rect');
    frame.setAttribute('x', String(x));
    frame.setAttribute('y', String(y));
    frame.setAttribute('width', String(rw));
    frame.setAttribute('height', String(rh));
    frame.setAttribute('rx', '5');
    frame.setAttribute('fill', 'none');
    frame.setAttribute('stroke', '#6e4028');
    frame.setAttribute('stroke-width', '4.5');
    frame.setAttribute('stroke-linecap', 'round');
    frame.setAttribute('stroke-linejoin', 'round');
    frame.setAttribute('stroke-dasharray', '5 21');
    frame.setAttribute('stroke-dashoffset', '0');
    frame.setAttribute('vector-effect', 'non-scaling-stroke');
    frame.setAttribute('class', 'heyu-frame heyu-frame-dots');
    svg.appendChild(frame);

    const banner = document.createElementNS(NS, 'text');
    banner.setAttribute('x', String(x + 7));
    banner.setAttribute('y', String(y + 16));
    banner.setAttribute('class', 'heyu-banner');
    banner.textContent = '合域';
    svg.appendChild(banner);
  });
}

function cellsForProduct(exampleId){
  const spec = PRODUCT_COVERAGE[exampleId];
  if(!spec) return [];
  const parts = coveragePartsFromSpec(spec);
  const seen = new Set();
  const out = [];
  for(const p of parts){
    const rid = rowIdByLabel(p.rowLabel);
    if(rid === null) continue;
    const cols = p.cols === 'all' ? [...Array(N_COLS).keys()] : (p.cols || []);
    for(const c of cols){
      const key = `${rid},${c}`;
      if(seen.has(key)) continue;
      seen.add(key);
      const td = document.querySelector(`td.cell[data-row="${rid}"][data-col="${c}"]`);
      if(td) out.push(td);
    }
  }
  return out;
}

/** 同一行内合并连续列 → { row, c0, c1 } */
function rowRunsFromCells(cells){
  const byRow = new Map();
  cells.forEach(td=>{
    const row = td.getAttribute('data-row');
    const col = +td.getAttribute('data-col');
    if(!byRow.has(row)) byRow.set(row, []);
    byRow.get(row).push(col);
  });
  const runs = [];
  byRow.forEach((cols, row)=>{
    cols.sort((a,b)=>a-b);
    let s = cols[0], p = cols[0];
    for(let i = 1; i < cols.length; i++){
      if(cols[i] === p + 1){
        p = cols[i];
      } else {
        runs.push({ row, c0: s, c1: p });
        s = p = cols[i];
      }
    }
    runs.push({ row, c0: s, c1: p });
  });
  return runs;
}

/** 相同列区间、行号连续 → 纵向合并为大矩形 */
function mergeRunsVertical(runs){
  if(!runs.length) return [];
  const sorted = [...runs].sort((a,b)=>{
    if(a.c0 !== b.c0) return a.c0 - b.c0;
    if(a.c1 !== b.c1) return a.c1 - b.c1;
    return (+a.row) - (+b.row);
  });
  const out = [];
  let cur = {
    row: sorted[0].row,
    rowEnd: sorted[0].row,
    c0: sorted[0].c0,
    c1: sorted[0].c1,
    ck: `${sorted[0].c0},${sorted[0].c1}`
  };
  for(let i = 1; i < sorted.length; i++){
    const r = sorted[i];
    const ck = `${r.c0},${r.c1}`;
    if(ck === cur.ck && (+r.row === +cur.rowEnd + 1)){
      cur.rowEnd = r.row;
    } else {
      out.push(cur);
      cur = { row: r.row, rowEnd: r.row, c0: r.c0, c1: r.c1, ck };
    }
  }
  out.push(cur);
  return out;
}

function cellRectRelWrap(td, wrap){
  const g = td.getBoundingClientRect();
  const w = wrap.getBoundingClientRect();
  return {
    left: g.left - w.left + wrap.scrollLeft,
    top: g.top - w.top + wrap.scrollTop,
    width: g.width,
    height: g.height
  };
}

function unionRects(rects){
  let L = Infinity, T = Infinity, R = -Infinity, B = -Infinity;
  for(const r of rects){
    L = Math.min(L, r.left);
    T = Math.min(T, r.top);
    R = Math.max(R, r.left + r.width);
    B = Math.max(B, r.top + r.height);
  }
  if(!isFinite(L)) return null;
  return { left: L, top: T, width: R - L, height: B - T };
}

function rectForRowColSpan(wrap, row, rowEnd, c0, c1){
  const rects = [];
  for(let r = +row; r <= +rowEnd; r++){
    for(let c = c0; c <= c1; c++){
      const td = document.querySelector(`td.cell[data-row="${r}"][data-col="${c}"]`);
      if(td) rects.push(cellRectRelWrap(td, wrap));
    }
  }
  return rects.length ? unionRects(rects) : null;
}

function rectDashForOverlayIndex(i){
  const m = i % 3;
  if(m === 0) return '';
  if(m === 1) return '7 5';
  return '3 4';
}

/** 产品在 FO_PRODUCT_RAIL 展平顺序中的下标（与是否勾选无关）→ 线型固定 */
function productRailExampleIndex(pid){
  let i = 0;
  for(let li = 0; li < FO_PRODUCT_RAIL.length; li++){
    const exs = FO_PRODUCT_RAIL[li].examples;
    for(let ei = 0; ei < exs.length; ei++){
      if(exs[ei].id === pid) return i;
      i++;
    }
  }
  return 0;
}

function overlayDashStyleForPid(pid){
  return rectDashForOverlayIndex(productRailExampleIndex(pid));
}

function phLegendStrokeSvgHtml(pid){
  const stroke = fixedExampleColor(pid);
  const dash = overlayDashStyleForPid(pid);
  const dashAttr = dash ? ` stroke-dasharray="${escHtml(dash)}"` : '';
  const s = escHtml(stroke);
  return `<svg class="ph-leg-line" width="22" height="8" viewBox="0 0 22 8" aria-hidden="true"><line x1="1" y1="4" x2="21" y2="4" fill="none" stroke="${s}" stroke-width="2" stroke-linecap="round"${dashAttr}/></svg>`;
}

/** 覆盖少 → 排序靠前（与浮层顶层一致，tooltip 先写更窄、更在上层的例） */
function comparePidByCoverageAsc(a, b){
  const ca = cellsForProduct(a).length;
  const cb = cellsForProduct(b).length;
  if(ca !== cb) return ca - cb;
  return a.localeCompare(b);
}

/** 浮层绘制顺序：Trusted Family 始终在底层（最外框、最不挡字）；其余按格子数降序叠在内层 */
function overlayDrawOrder(catalogOrder){
  const counts = new Map(catalogOrder.map(pid=>[pid, cellsForProduct(pid).length]));
  const hasTf = catalogOrder.includes('trusted-family');
  const rest = catalogOrder.filter(pid=>pid !== 'trusted-family');
  const sortedRest = [...rest].sort((a,b)=>{
    const d = counts.get(b) - counts.get(a);
    if(d !== 0) return d;
    return catalogOrder.indexOf(a) - catalogOrder.indexOf(b);
  });
  return hasTf ? ['trusted-family', ...sortedRest] : sortedRest;
}

function refreshPhScopeOverlay(){
  const wrap = document.getElementById('matrix-ph-wrap');
  const svg = document.getElementById('ph-scope-svg');
  if(!wrap || !svg) return;
  while(svg.firstChild) svg.removeChild(svg.firstChild);

  const catalogOrder = selectedIdsInCatalogOrder();
  const w = Math.max(1, wrap.clientWidth);
  const h = Math.max(1, wrap.clientHeight);
  svg.setAttribute('viewBox', `0 0 ${w} ${h}`);
  svg.setAttribute('width', String(w));
  svg.setAttribute('height', String(h));

  if(!catalogOrder.length) return;

  const drawOrder = overlayDrawOrder(catalogOrder);
  const nDraw = drawOrder.length;
  const NS = 'http://www.w3.org/2000/svg';

  drawOrder.forEach((pid, stackIdx)=>{
    const cells = cellsForProduct(pid);
    if(!cells.length) return;
    let runs = rowRunsFromCells(cells);
    runs = mergeRunsVertical(runs);
    const insetBase = 1.5 + stackIdx * 2.5;
    /** TF：额外内缩（更靠里的壳）；MFO / IQ-EQ：额外外扩（更靠外的壳） */
    const inset = Math.max(
      1,
      insetBase
        + (pid === 'trusted-family' ? 3 : 0)
        - (pid === 'bank-mfo' || pid === 'iq-eq' ? 3 : 0)
    );
    const stroke = fixedExampleColor(pid);
    const dash = overlayDashStyleForPid(pid);
    const fillOpacityBase = nDraw === 1
      ? '0.14'
      : String(0.09 + (stackIdx / (nDraw - 1)) * 0.1);
    const strokeOpacity = nDraw === 1
      ? '0.92'
      : String(0.84 + (stackIdx / Math.max(1, nDraw - 1)) * 0.16);
    const strokeW = nDraw === 1 ? '2' : String(1.85 + stackIdx * 0.22);

    runs.forEach(run=>{
      const box = rectForRowColSpan(wrap, run.row, run.rowEnd, run.c0, run.c1);
      if(!box || box.width < 2 || box.height < 2) return;
      const x = box.left + inset;
      const y = box.top + inset;
      const rw = box.width - 2 * inset;
      const rh = box.height - 2 * inset;
      if(rw < 4 || rh < 4) return;

      const rect = document.createElementNS(NS, 'rect');
      rect.setAttribute('x', String(x));
      rect.setAttribute('y', String(y));
      rect.setAttribute('width', String(rw));
      rect.setAttribute('height', String(rh));
      rect.setAttribute('rx', '3');
      rect.setAttribute('fill', stroke);
      rect.setAttribute('fill-opacity', fillOpacityBase);
      rect.setAttribute('stroke', stroke);
      rect.setAttribute('stroke-width', strokeW);
      rect.setAttribute('stroke-opacity', strokeOpacity);
      rect.setAttribute('paint-order', 'stroke fill');
      rect.setAttribute('vector-effect', 'non-scaling-stroke');
      rect.setAttribute('stroke-linejoin', 'round');
      if(dash) rect.setAttribute('stroke-dasharray', dash);
      svg.appendChild(rect);
    });
  });
}

function applyProductHighlights(){
  document.querySelectorAll('td.cell').forEach(td=>{
    td.classList.remove('ph-cell');
    td.style.boxShadow = '';
    td.style.backgroundColor = '';
    td.removeAttribute('data-ph-ids');
    td.removeAttribute('title');
  });

  const catalogOrder = selectedIdsInCatalogOrder();
  const cellToPids = new Map();

  activeProductIds.forEach(pid=>{
    cellsForProduct(pid).forEach(td=>{
      const k = `${td.getAttribute('data-row')},${td.getAttribute('data-col')}`;
      if(!cellToPids.has(k)) cellToPids.set(k, new Set());
      cellToPids.get(k).add(pid);
    });
  });

  cellToPids.forEach((pidSet, k)=>{
    const [row, col] = k.split(',');
    const td = document.querySelector(`td.cell[data-row="${row}"][data-col="${col}"]`);
    if(!td) return;
    const ids = [...pidSet].sort(comparePidByCoverageAsc);
    td.setAttribute('data-ph-ids', ids.join(' '));
    td.classList.add('ph-cell');
    td.setAttribute('title', cellCoverageTitle(ids));
  });

  const nSel = activeProductIds.size;
  const elS = document.getElementById('product-sel-count');
  if(elS) elS.textContent = nSel;
  updatePhLegend(catalogOrder);
  schedulePhOverlayRefresh();
}

  const tip = escHtml(`${categoryForExampleId(pid)} · ${coverageHintForProduct(pid)} · 线型固定：${lineDesc}`);
  return `<span class="ph-leg-item" title="${tip}">${phLegendStrokeSvgHtml(pid)}<i class="ph-swatch" style="--sw:${c}"></i><span class="ph-leg-txt">${lab}</span></span>`;

function toggleProduct(exampleId, implemented){

    activeProductIds.delete(exampleId);
  } else {
    activeProductIds.add(exampleId);
  }
  syncChipActiveStates();
  applyProductHighlights();
}

function buildExportProductAppendix(){
  const wrap = document.createElement('div');
  wrap.id = 'matrix-export-appendix';
  wrap.className = 'export-appendix';
  wrap.setAttribute('aria-hidden', 'true');
  const rows = FO_PRODUCT_RAIL.map(line=>{
    const legs = line.examples.map(ex=>`<span class="export-appendix-leg">${phLegendItemHtml(ex.id)}</span>`).join('');
    return `<tr>
      <td class="pt-cat">${escHtml(line.category)}</td>
      <td class="pt-form">${escHtml(line.form)}</td>
      <td class="pt-core">${escHtml(line.coreValue)}</td>
      <td class="pt-reps">${escHtml(line.reps)}</td>
      <td class="pt-ex export-appendix-ex">${legs}</td>
    </tr>`;
  }).join('');
  wrap.innerHTML =
    '<h3 class="export-appendix-title">市面常见家办相关产品（图例与矩阵中线型、色块一致）</h3>' +
    '<div class="export-appendix-table-wrap">' +
    '<table class="product-table export-appendix-table"><thead><tr>' +
    '<th>类别</th><th>形态</th><th>核心价值</th><th>代表产品</th><th>例子（图例）</th>' +
    '</tr></thead><tbody>' + rows + '</tbody></table></div>';
  return wrap;
}

function clearProductSelection(){
  activeProductIds.clear();
  syncChipActiveStates();
  applyProductHighlights();
}

function buildProductRail(){
  const host = document.getElementById('product-rail-body');
  if(!host) return;
  const rows = FO_PRODUCT_RAIL.map(line=>{
    const repsTitle = escHtml(line.reps);
    const chips = line.examples.map(ex=>{
      const impl = !!ex.implemented && PRODUCT_COVERAGE[ex.id];
      const cls = ['ex-chip', impl ? '' : 'ex-soon'].filter(Boolean).join(' ');
      const accent = fixedExampleColor(ex.id);
      return `<button type="button" class="${cls}" data-ex-id="${escHtml(ex.id)}" data-impl="${impl?'1':'0'}" style="--ex-accent:${accent}">${escHtml(ex.label)}</button>`;
    }).join(' ');
    return `<tr>
      <td class="pt-cat" title="${repsTitle}">${escHtml(line.category)}</td>
      <td class="pt-form">${escHtml(line.form)}</td>
      <td class="pt-core">${escHtml(line.coreValue)}</td>
      <td class="pt-reps" title="${repsTitle}">${escHtml(line.reps)}</td>
      <td class="pt-ex">${chips}</td>
    </tr>`;
  }).join('');
  host.innerHTML =
    '<div class="product-table-wrap"><table class="product-table"><thead><tr>' +
    '<th>类别</th><th>形态</th><th>核心价值</th><th>代表产品</th><th>例子（点击）</th>' +
    '</tr></thead><tbody>' + rows + '</tbody></table></div>';
  host.querySelectorAll('button.ex-chip').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const id = btn.getAttribute('data-ex-id');
      const impl = btn.getAttribute('data-impl') === '1';
      toggleProduct(id, impl);
    });
  });
  syncChipActiveStates();
  applyProductHighlights();
  if(productPopEl() && productPopEl().classList.contains('show')){
    requestAnimationFrame(()=>{
      positionProductPanel();
      requestAnimationFrame(positionProductPanel);
    });
  }
}

function productPopEl(){ return document.getElementById('product-popover'); }
function productBackdropEl(){ return document.getElementById('product-pop-backdrop'); }

let productLayoutBound = false;
function onProductPanelLayout(){
  if(productPopEl() && productPopEl().classList.contains('show')) positionProductPanel();
}
function bindProductPanelLayout(){
  if(productLayoutBound) return;
  window.addEventListener('resize', onProductPanelLayout);
  window.addEventListener('scroll', onProductPanelLayout, true);
  productLayoutBound = true;
}
function unbindProductPanelLayout(){
  if(!productLayoutBound) return;
  window.removeEventListener('resize', onProductPanelLayout);
  window.removeEventListener('scroll', onProductPanelLayout, true);
  productLayoutBound = false;
}

function positionProductPanel(){
  const btn = document.getElementById('btn-open-products');
  const pop = productPopEl();
  if(!btn || !pop || !pop.classList.contains('show')) return;

  const r = btn.getBoundingClientRect();
  const vw = window.innerWidth;
  const vh = window.innerHeight;
  const pad = 12;
  const gap = 8;

  let w = Math.min(1000, Math.max(320, vw - pad * 2));
  let left = Math.round(r.left);
  if(left + w > vw - pad) left = Math.max(pad, vw - pad - w);
  if(left < pad) left = pad;

  pop.classList.remove('flip-up');
  pop.style.width = w + 'px';
  pop.style.left = left + 'px';
  pop.style.top = Math.round(r.bottom + gap) + 'px';

  const panel = pop.querySelector('.product-popover-panel');
  const baseMax = Math.min(Math.round(vh * 0.72), 600);
  pop.style.maxHeight = baseMax + 'px';
  if(panel) panel.style.maxHeight = baseMax + 'px';

  void pop.offsetHeight;
  const ph = pop.getBoundingClientRect().height;
  const bottom = r.bottom + gap + ph;
  const roomAbove = r.top - pad;
  const roomBelow = vh - r.bottom - pad - gap;

  if(bottom > vh - pad && roomAbove > roomBelow && r.top - gap - ph >= pad){
    pop.classList.add('flip-up');
    pop.style.top = Math.round(r.top - gap - ph) + 'px';
  } else if(bottom > vh - pad){
    const fit = Math.max(200, vh - pad - Math.round(r.bottom + gap) - 4);
    pop.style.maxHeight = fit + 'px';
    if(panel) panel.style.maxHeight = fit + 'px';
  }
}

function setProductPanelOpen(open){
  const p = productPopEl();
  const b = productBackdropEl();
  const t = document.getElementById('btn-open-products');
  if(!p || !b) return;
  p.classList.toggle('show', open);
  b.classList.toggle('show', open);
  p.setAttribute('aria-hidden', open ? 'false' : 'true');
  b.setAttribute('aria-hidden', open ? 'false' : 'true');
  if(t) t.setAttribute('aria-expanded', open ? 'true' : 'false');
  if(open){
    bindProductPanelLayout();
    requestAnimationFrame(()=>{
      positionProductPanel();
      requestAnimationFrame(positionProductPanel);
    });
  } else {
    unbindProductPanelLayout();
    p.style.left = '';
    p.style.top = '';
    p.style.width = '';
    p.style.maxHeight = '';
    p.classList.remove('flip-up');
    const panel = p.querySelector('.product-popover-panel');
    if(panel) panel.style.maxHeight = '';
  }
}

function closeProductPanel(){ setProductPanelOpen(false); }

let _htmlToImageLoadPromise = null;
/**
 * html-to-image：用 SVG foreignObject 走浏览器原生排版，表格上的绝对定位 SVG 叠层能进 PNG。
 * html2canvas / html2canvas-pro 对「表 + 兄弟 SVG 浮层」常整块漏画，故不再用作主路径。
 */
function loadHtmlToImage(){
  if(_htmlToImageLoadPromise) return _htmlToImageLoadPromise;
  _htmlToImageLoadPromise = new Promise((resolve, reject)=>{
    if(typeof window.htmlToImage === 'object' && typeof window.htmlToImage.toBlob === 'function' && window.__matrixHtmlToImage){
      resolve();
      return;
    }
    const s = document.createElement('script');
    s.src = 'https://cdn.jsdelivr.net/npm/html-to-image@1.11.11/dist/html-to-image.js';
    s.async = true;
    s.onload = ()=>{
      window.__matrixHtmlToImage = true;
      if(!window.htmlToImage || typeof window.htmlToImage.toBlob !== 'function'){
        _htmlToImageLoadPromise = null;
        reject(new Error('导出组件未挂载'));
        return;
      }
      resolve();
    };
    s.onerror = ()=>{
      _htmlToImageLoadPromise = null;
      reject(new Error('无法加载导出组件'));
    };
    document.head.appendChild(s);
  });
  return _htmlToImageLoadPromise;
}

function padExport2(n){
  return String(n).padStart(2, '0');
}

/** 导出前：把含 oklch 的 presentation 属性换成浏览器已解析的颜色（须在 removeAttribute 之前读 getComputedStyle） */
function rewriteOklchPaintForExport(rootEl){
  const backups = [];
  if(!rootEl) return backups;
  rootEl.querySelectorAll('*').forEach(el=>{
    const attrs = [...el.attributes];
    attrs.forEach(attr=>{
      const val = attr.value;
      if(!val || (!val.includes('oklch') && !val.includes('OKLCH'))) return;
      const n = attr.name;
      let clearStyleProp;
      let styleReplaced;
      if(n === 'fill' || n === 'stroke'){
        const cs = getComputedStyle(el);
        let v = n === 'fill' ? cs.fill : cs.stroke;
        v = String(v || '');
        if(!v || v === 'none' || v.toLowerCase().includes('oklch')) v = n === 'fill' ? '#9a9a9a' : '#444444';
        backups.push({ el, name: n, value: val, clearStyleProp: n });
        el.removeAttribute(n);
        el.style.setProperty(n, v);
      } else if(n === 'style'){
        const cs = getComputedStyle(el);
        const bg = cs.backgroundColor;
        backups.push({ el, name: n, value: val, styleReplaced: true });
        el.removeAttribute(n);
        el.style.cssText = '';
        if(bg && !bg.toLowerCase().includes('oklch')) el.style.backgroundColor = bg;
        else el.style.backgroundColor = '#c8c8c8';
        el.style.width = cs.width;
        el.style.height = cs.height;
        el.style.display = cs.display;
        el.style.borderRadius = cs.borderRadius;
      } else {
        backups.push({ el, name: n, value: val });
        el.removeAttribute(n);
      }
    });
  });
  return backups;
}

/** 部分栅格化路径对 defs 内 SMIL + url(#…) 不稳；导出时暂时摘掉，拍完再挂上 */
function stripSvgSmilForExport(rootEl){
  const backups = [];
  if(!rootEl) return backups;
  const nodes = [...rootEl.querySelectorAll('svg animate, svg animateTransform, svg set')];
  nodes.forEach(node=>{
    const parent = node.parentNode;
    if(!parent) return;
    backups.push({ parent, before: node.nextSibling, node });
    parent.removeChild(node);
  });
  return backups;
}

function restoreSvgSmilForExport(backups){
  if(!backups || !backups.length) return;
  backups.forEach(b=>{
    if(!b.parent || !b.node) return;
    try{
      b.parent.insertBefore(b.node, b.before || null);
    } catch(_){ /* 父节点已换则跳过 */ }
  });
}

/** inline-block 包裹层下绝对定位 SVG 在部分栅格化路径中叠层丢失，导出时改为 block 并刷新叠层 */
function pushMatrixPhWrapExportLayout(){
  const wrap = document.getElementById('matrix-ph-wrap');
  if(!wrap) return null;
  return {
    el: wrap,
    display: wrap.style.display,
    verticalAlign: wrap.style.verticalAlign
  };
}

function applyMatrixPhWrapExportLayout(){
  const wrap = document.getElementById('matrix-ph-wrap');
  if(!wrap) return;
  wrap.style.setProperty('display', 'block', 'important');
  wrap.style.setProperty('vertical-align', 'top', 'important');
}

function restoreMatrixPhWrapExportLayout(snap){
  if(!snap || !snap.el) return;
  if(snap.display) snap.el.style.display = snap.display;
  else snap.el.style.removeProperty('display');
  if(snap.verticalAlign) snap.el.style.verticalAlign = snap.verticalAlign;
  else snap.el.style.removeProperty('vertical-align');
}

function restoreOklchPaintBackup(backups){
  if(!backups || !backups.length) return;
  backups.forEach(b=>{
    if(!b.el || !b.el.isConnected) return;
    if(b.clearStyleProp) b.el.style.removeProperty(b.clearStyleProp);
    if(b.styleReplaced) b.el.removeAttribute('style');
    b.el.setAttribute(b.name, b.value);
  });
}

function restoreMatrixScrollExportStyles(sc, snap){
  if(!sc || !snap) return;
  sc.style.overflow = snap.overflow;
  sc.style.maxHeight = snap.maxHeight;
  sc.style.height = snap.height;
  sc.style.width = snap.width;
  if(!snap.overflow) sc.style.removeProperty('overflow');
  if(!snap.maxHeight) sc.style.removeProperty('maxHeight');
  if(!snap.height) sc.style.removeProperty('height');
  if(!snap.width) sc.style.removeProperty('width');
}

function exportBodyBackgroundSafe(){
  const v = getComputedStyle(document.body).backgroundColor;
  if(!v || String(v).toLowerCase().includes('oklch(')) return '#f7f6f3';
  return v;
}

async function exportMatrixPng(){
  const root = document.getElementById('matrix-export-root');
  const sc = document.getElementById('matrix-scroll');
  const btn = document.getElementById('btn-export-matrix-png');
  if(!root || !sc) return;
  if(productPopEl()?.classList.contains('show')) closeProductPanel();
  if(btn) btn.disabled = true;
  toast('正在生成图片…');
  let snap = null;
  let wrapSnap = null;
  let paintBackup = [];
  let smilBackup = [];
  let exportAppendixEl = null;
  try{
    await loadHtmlToImage();
    if(!window.htmlToImage || typeof window.htmlToImage.toBlob !== 'function') throw new Error('导出组件未就绪');
    sc.scrollLeft = 0;
    sc.scrollTop = 0;
    await new Promise(r=>requestAnimationFrame(r));
    const fullH = sc.scrollHeight;
    const fullW = sc.scrollWidth;
    snap = {
      overflow: sc.style.overflow,
      maxHeight: sc.style.maxHeight,
      height: sc.style.height,
      width: sc.style.width
    };
    sc.style.overflow = 'visible';
    sc.style.maxHeight = 'none';
    sc.style.height = `${fullH}px`;
    sc.style.width = `${fullW}px`;
    schedulePhOverlayRefresh();
    scheduleHeyuScopeRefresh();
    await new Promise(r=>requestAnimationFrame(()=>requestAnimationFrame(r)));
    wrapSnap = pushMatrixPhWrapExportLayout();
    applyMatrixPhWrapExportLayout();
    schedulePhOverlayRefresh();
    scheduleHeyuScopeRefresh();
    await new Promise(r=>requestAnimationFrame(()=>requestAnimationFrame(r)));
    exportAppendixEl = buildExportProductAppendix();
    root.appendChild(exportAppendixEl);
    await new Promise(r=>requestAnimationFrame(r));
    paintBackup = rewriteOklchPaintForExport(root);
    smilBackup = stripSvgSmilForExport(root);
    await new Promise(r=>requestAnimationFrame(r));
    const bg = exportBodyBackgroundSafe();
    const shotOpts = { cacheBust: true, pixelRatio: 2, backgroundColor: bg };
    let blob;
    try{
      blob = await window.htmlToImage.toBlob(root, shotOpts);
    } catch(err1){
      console.warn('导出快照重试（skipFonts）', err1);
      blob = await window.htmlToImage.toBlob(root, { ...shotOpts, skipFonts: true });
    }
    restoreMatrixScrollExportStyles(sc, snap);
    snap = null;
    if(!blob){
      toast('导出失败');
      throw new Error('未生成图片数据');
    }
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    const d = new Date();
    a.download = `家办业务覆盖对比图-${d.getFullYear()}${padExport2(d.getMonth() + 1)}${padExport2(d.getDate())}-${padExport2(d.getHours())}${padExport2(d.getMinutes())}.png`;
    a.href = url;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(()=>URL.revokeObjectURL(url), 2000);
    toast('已导出 PNG');
  } catch(e){
    console.error(e);
    toast('导出失败：' + (e && e.message ? e.message : String(e)));
    restoreMatrixScrollExportStyles(sc, snap);
  } finally{
    if(exportAppendixEl){
      exportAppendixEl.remove();
      exportAppendixEl = null;
    }
    restoreMatrixPhWrapExportLayout(wrapSnap);
    restoreSvgSmilForExport(smilBackup);
    restoreOklchPaintBackup(paintBackup);
    syncStickyOffsets();
    schedulePhOverlayRefresh();
    scheduleHeyuScopeRefresh();
    if(btn) btn.disabled = false;
  }
}

function toggleProductPanel(){
  const p = productPopEl();
  setProductPanelOpen(!p || !p.classList.contains('show'));
}

buildProductRail();

document.getElementById('btn-open-products')?.addEventListener('click', toggleProductPanel);
document.getElementById('product-pop-backdrop')?.addEventListener('click', closeProductPanel);
document.getElementById('btn-close-product-pop')?.addEventListener('click', closeProductPanel);
document.getElementById('btn-clear-in-pop')?.addEventListener('click', ()=>{ clearProductSelection(); });

document.addEventListener('keydown', e=>{
  if(e.key === 'Escape' && productPopEl()?.classList.contains('show')){
    closeProductPanel();
  }
});
syncStickyOffsets();
window.addEventListener('resize', syncStickyOffsets);
requestAnimationFrame(()=>{ syncStickyOffsets(); });

document.getElementById('btn-toggle-heyu-scope')?.addEventListener('click', ()=>{
  setHeyuScopeLayer(!heyuScopeLayerOn);
});

document.getElementById('btn-export-matrix-png')?.addEventListener('click', ()=>{
  exportMatrixPng();
});

document.getElementById('matrix-scroll')?.addEventListener('scroll', ()=>{
  scheduleHeyuScopeRefresh();
  schedulePhOverlayRefresh();
}, { passive: true });

let currentDownload = null;
function openModal(title, displayText, filename, mime, downloadText){
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-content').value = displayText;
  currentDownload = {
    filename, mime,
    text: downloadText !== undefined ? downloadText : displayText
  };
  document.getElementById('modal-mask').classList.add('show');
}
function closeModal(){
  document.getElementById('modal-mask').classList.remove('show');
}
function copyModal(){
  const ta = document.getElementById('modal-content');
  ta.select();
  try {
    const ok = document.execCommand('copy');
    toast(ok ? '📋 已复制到剪贴板' : '复制失败，请手动选择复制');
  } catch(e){ toast('复制失败，请手动选择复制'); }
  ta.setSelectionRange(0,0);
}
function downloadModal(){
  if(!currentDownload) return;
  try {
    const blob = new Blob([currentDownload.text], { type: currentDownload.mime });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = currentDownload.filename;
    document.body.appendChild(a); a.click();
    document.body.removeChild(a);
    setTimeout(()=>URL.revokeObjectURL(url), 500);
    toast('⬇️ 已下载 ' + currentDownload.filename);
  } catch(e){
    toast('下载被拦截，请用"复制"按钮');
  }
}
document.getElementById('modal-mask').addEventListener('click', e=>{
  if(e.target.id==='modal-mask') closeModal();
});

function toast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(()=>t.classList.remove('show'), 2200);
}
